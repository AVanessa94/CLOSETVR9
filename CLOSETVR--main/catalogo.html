<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ClosetVR</title>
<style>
    body { margin: 0; font-family: Arial; background: #fdfcfb; }
    header { background: #fdfcfb; padding: 20px; display: flex; 
             justify-content: space-between; align-items: center; border-bottom: 1px solid #ddd; }
    .card { background: white; border: 1px solid #ccc; border-radius: 8px; padding: 15px;
            width: 160px; cursor: pointer; }
    .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 15px; }
    .btn { padding: 10px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
    .btn-carrito { background: #d4c4b0; color: white; }
    .btn-armario { background: #111111; color: white; }
    #detalle, #carrito { display: none; padding: 20px; }
    .back { cursor: pointer; font-size: 14px; margin-bottom: 20px; display: inline-block; }
    .producto-img { font-size: 60px; background: #f9f8f7; padding: 40px; border-radius: 5px; }
</style>
</head>
<body>

<header>
    <h2>ClosetVR</h2>
    <span id="carritoBtn" style="font-size:18px; cursor:pointer;">🛒 (0)</span>
</header>

<div id="buscador" style="padding: 15px;">
    <input id="search" type="text" placeholder="Buscar productos..." 
           style="width: 100%; padding: 10px; font-size: 14px;">
</div>

<!-- CATÁLOGO -->
<div id="catalogo" class="grid"></div>

<!-- DETALLE -->
<div id="detalle"></div>

<!-- CARRITO -->
<div id="carrito"></div>

<script>
let carrito = [];
let armario = [];
let productos = [];

// Cargar productos desde Flask
fetch("/api/productos")
  .then(res => res.json())
  .then(data => {
      productos = data.map(p => ({
          id: p.id,
          nombre: p.nombre,
          precio: p.precio,
          descripcion: p.descripcion || "",
          detalles: p.descripcion || "",
          imagen: "👗", // emoji genérico
          categoria: p.categoria || ""
      }));
      mostrarCatalogo();
  })
  .catch(err => console.error("Error cargando productos:", err));

function mostrarCatalogo(lista = productos) {
    document.getElementById("detalle").style.display = "none";
    document.getElementById("carrito").style.display = "none";
    document.getElementById("catalogo").style.display = "grid";

    let html = "";
    lista.forEach(p => {
        html += `
            <div class="card" onclick="verDetalle(${p.id})">
                <div style="font-size:40px; text-align:center;">${p.imagen}</div>
                <h4>${p.nombre}</h4>
                <strong>$${p.precio.toLocaleString()} COP</strong><br><br>
                <button class="btn btn-carrito" onclick="agregarAlCarrito(event, ${p.id})">🛒 Carrito</button>
                <button class="btn btn-armario" onclick="agregarAlArmario(event, ${p.id})">💾 Armario</button>
            </div>
        `;
    });

    document.getElementById("catalogo").innerHTML = html;
}

function verDetalle(id) {
    let p = productos.find(x => x.id === id);
    document.getElementById("catalogo").style.display = "none";
    let d = document.getElementById("detalle");
    d.style.display = "block";
    d.innerHTML = `
        <span class="back" onclick="mostrarCatalogo()">← Volver</span>
        <div class="producto-img">${p.imagen}</div>
        <h2>${p.nombre}</h2>
        <h3>$${p.precio.toLocaleString()} COP</h3>
        <p><b>Descripción:</b> ${p.detalles}</p>
        <button class="btn btn-carrito" onclick="agregarDesdeDetalle(${p.id})">🛒 Añadir al carrito</button><br><br>
        <button class="btn btn-armario" onclick="armario.push(${p.id})">💾 Guardar en armario</button>
    `;
}

function agregarAlCarrito(e, id) {
    e.stopPropagation();
    carrito.push(productos.find(x => x.id === id));
    actualizarCarrito();
    alert("Producto añadido al carrito");
}

function agregarAlArmario(e, id) {
    e.stopPropagation();
    armario.push(productos.find(x => x.id === id));
    alert("Guardado en tu armario");
}

function agregarDesdeDetalle(id) {
    carrito.push(productos.find(x => x.id === id));
    actualizarCarrito();
    alert("Producto añadido al carrito");
}

function actualizarCarrito() {
    document.getElementById("carritoBtn").innerText = `🛒 (${carrito.length})`;
}

document.getElementById("carritoBtn").onclick = function() {
    mostrarCarrito();
};

function mostrarCarrito() {
    document.getElementById("catalogo").style.display = "none";
    document.getElementById("detalle").style.display = "none";
    let c = document.getElementById("carrito");
    c.style.display = "block";

    if (carrito.length === 0) {
        c.innerHTML = `<span class="back" onclick="mostrarCatalogo()">← Volver</span>
                       <h2>Tu carrito está vacío</h2>`;
        return;
    }

    let total = 0;
    let html = `<span class="back" onclick="mostrarCatalogo()">← Volver</span>
                <h2>Mi Carrito</h2>`;

    carrito.forEach((p, i) => {
        total += p.precio;
        html += `
            <div class="card" style="width:100%; cursor:auto;">
                <h4>${p.nombre}</h4>
                <p>$${p.precio.toLocaleString()} COP</p>
                <button class="btn" style="background:#e74c3c; color:white"
                        onclick="eliminar(${i})">🗑️ Eliminar</button>
            </div><br>
        `;
    });

    html += `<h3>Total: $${total.toLocaleString()} COP</h3>
             <button class="btn btn-carrito" onclick="comprar()">💳 Proceder al pago</button>`;
    c.innerHTML = html;
}

function eliminar(i) {
    carrito.splice(i, 1);
    mostrarCarrito();
    actualizarCarrito();
}

function comprar() {
    if (carrito.length === 0) return alert("Carrito vacío");
    carrito.forEach(p => armario.push(p));
    carrito = [];
    actualizarCarrito();
    alert("¡Compra realizada con éxito!");
    mostrarCatalogo();
}

// Buscador
document.getElementById("search").addEventListener("keyup", function() {
    let q = this.value.toLowerCase();
    let filtrados = productos.filter(p =>
        p.nombre.toLowerCase().includes(q)
    );
    mostrarCatalogo(filtrados);
});
</script>
</body>
</html>
